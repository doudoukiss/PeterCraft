name: validate_build_test_quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  windows-headless:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - configuration: Debug
            build_preset: windows-vs2022-headless-debug
            artifact_suffix: debug
            run_checks: true
          - configuration: Release
            build_preset: windows-vs2022-headless-release
            artifact_suffix: release
            run_checks: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Bootstrap
        shell: pwsh
        run: ./tools/build-scripts/bootstrap.ps1

      - name: Validate
        if: matrix.run_checks
        shell: pwsh
        run: ./tools/build-scripts/validate.ps1

      - name: Build headless
        shell: pwsh
        run: ./tools/build-scripts/build-headless.ps1 -ConfigurePreset windows-vs2022-headless -BuildPreset ${{ matrix.build_preset }}

      - name: Test headless
        if: matrix.run_checks
        shell: pwsh
        run: ./tools/build-scripts/test.ps1 -ConfigurePreset windows-vs2022-headless -Configuration ${{ matrix.configuration }}

      - name: Run headless quality gate
        if: matrix.run_checks
        shell: pwsh
        run: |
          ./tools/build-scripts/run-headless.ps1 -ConfigurePreset windows-vs2022-headless -Configuration ${{ matrix.configuration }}
          ./tools/build-scripts/quality.ps1 check-budgets --profile-id phase6_shell
          ./tools/build-scripts/quality.ps1 check-budgets --profile-id phase7_playable
          ./tools/build-scripts/quality.ps1 verify-saves
          ./tools/build-scripts/quality.ps1 export-qa-matrix
          ./tools/build-scripts/quality.ps1 gate-rc --profile-id phase6_shell

      - name: Upload headless build artifact
        uses: actions/upload-artifact@v4
        with:
          name: petercraft-phase7-headless-${{ matrix.artifact_suffix }}-build
          path: |
            out/build/windows-vs2022-headless/bin/${{ matrix.configuration }}/PeterCraftApp.exe
            Saved/Logs/*.jsonl
            Saved/Generated/quality/*

  linux-headless-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Clang and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build

      - name: Configure Linux headless smoke
        run: cmake --preset linux-clang-headless-smoke

      - name: Build Linux headless smoke
        run: cmake --build --preset linux-clang-headless-smoke
