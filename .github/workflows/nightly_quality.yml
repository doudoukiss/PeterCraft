name: nightly_quality

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  headless-soak-and-quality:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Bootstrap
        shell: pwsh
        run: ./tools/build-scripts/bootstrap.ps1

      - name: Build headless
        shell: pwsh
        run: ./tools/build-scripts/build-headless.ps1

      - name: Run nightly headless soak
        shell: pwsh
        run: |
          ./tools/build-scripts/quality.ps1 run-soak --iterations 4
          ./tools/build-scripts/quality.ps1 check-budgets --profile-id phase6_shell
          ./tools/build-scripts/quality.ps1 check-budgets --profile-id phase7_playable
          ./tools/build-scripts/quality.ps1 verify-saves

      - name: Upload nightly headless quality artifacts
        uses: actions/upload-artifact@v4
        with:
          name: petercraft-nightly-headless-quality
          path: |
            Saved/Logs/*.jsonl
            Saved/Generated/quality/*
